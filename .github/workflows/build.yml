name: build
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements-win.txt
      - name: Install Tesseract (Chocolatey)
        shell: pwsh
        run: |
          # Install via Chocolatey (preinstalled on windows-latest). It is reliable
          # from CI IPs (the UB-Mannheim mirror returns HTTP 403 to datacenter IPs)
          # and Chocolatey verifies the package checksum itself (supply-chain
          # integrity). The package installs English + OSD language data.
          choco install tesseract --no-progress -y
          $src = "C:\Program Files\Tesseract-OCR"
          if (-not (Test-Path "$src\tesseract.exe")) {
            Write-Error "Tesseract not found at $src after choco install"
            exit 1
          }
          New-Item -ItemType Directory -Force -Path build\Tesseract-OCR | Out-Null
          Copy-Item -Recurse -Force "$src\*" build\Tesseract-OCR\
          # Sanity-check the bundled binary and that English data is present.
          & "build\Tesseract-OCR\tesseract.exe" --list-langs
      - run: python build/build_exe.py
      - uses: actions/upload-artifact@v4
        with: { name: Hex2ASCII-exe, path: build/dist/Hex2ASCII.exe }

  linux-appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libfuse2
      - run: bash build/build_appimage.sh
      - uses: actions/upload-artifact@v4
        with: { name: Hex2ASCII-AppImage, path: Hex2ASCII-x86_64.AppImage }

  linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash build/build_deb.sh
      - uses: actions/upload-artifact@v4
        with: { name: Hex2ASCII-deb, path: hex2ascii_2.0.0_all.deb }

  arch-pkg:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - run: pacman -Syu --noconfirm base-devel sudo
      - name: Build with makepkg (non-root)
        run: |
          useradd -m builder
          cp -r . /home/builder/src
          chown -R builder /home/builder/src
          su builder -c "cd /home/builder/src/build && makepkg -f --nodeps"
          cp /home/builder/src/build/*.pkg.tar.zst .
      - uses: actions/upload-artifact@v4
        with: { name: Hex2ASCII-arch, path: "*.pkg.tar.zst" }

  release:
    needs: [windows-exe, linux-appimage, linux-deb, arch-pkg]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            Hex2ASCII-exe/Hex2ASCII.exe
            Hex2ASCII-AppImage/Hex2ASCII-x86_64.AppImage
            Hex2ASCII-deb/hex2ascii_2.0.0_all.deb
            Hex2ASCII-arch/*.pkg.tar.zst
